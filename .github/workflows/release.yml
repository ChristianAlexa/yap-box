name: Release
on:
  push:
    tags: ['v*']

env:
  # Pin Kokoros by commit SHA — tags are mutable. Bump this deliberately when
  # upstream has a fix we need.
  KOKOROS_SHA: 7089168f0ca2d8e1fcd8e523c9d75d915c6afdff

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches manifest versions
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $VERSION"

          PKG_VERSION=$(jq -r '.version' package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

          CARGO_VERSION=$(sed -n '/^\[package\]/,/^\[/{ s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p; }' src-tauri/Cargo.toml | head -n1)
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::src-tauri/Cargo.toml [package] version ($CARGO_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          if [ "$TAURI_VERSION" != "$VERSION" ]; then
            echo "::error::src-tauri/tauri.conf.json version ($TAURI_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

          echo "All manifest versions match $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            kokoros-src

      - name: Checkout Kokoros at pinned SHA
        uses: actions/checkout@v4
        with:
          repository: lucasjinreal/Kokoros
          ref: ${{ env.KOKOROS_SHA }}
          path: kokoros-src

      - name: Build Kokoros sidecar (arm64)
        working-directory: kokoros-src
        # CMake 4 removed implicit support for cmake_minimum_required < 3.5.
        # libopus (bundled via audiopus_sys) still declares the old minimum,
        # so we opt back in for the whole build. Remove once upstream bumps.
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: cargo build --release --target aarch64-apple-darwin --bin koko

      - name: Stage + ad-hoc sign sidecar
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          cp kokoros-src/target/aarch64-apple-darwin/release/koko \
             src-tauri/binaries/koko-aarch64-apple-darwin
          chmod +x src-tauri/binaries/koko-aarch64-apple-darwin
          codesign --sign - --force --timestamp=none \
            src-tauri/binaries/koko-aarch64-apple-darwin
          codesign --verify --verbose src-tauri/binaries/koko-aarch64-apple-darwin

      - name: Stage espeak-ng data for bundling
        # espeak-rs-sys compiles espeak-ng and hardcodes its OUT_DIR data path
        # into the binary. That path only exists on the CI runner, so a
        # DMG-installed koko can't find its phoneme tables on a user's Mac.
        # Copy the data into the Tauri resources dir so it rides along with
        # the app; kokoros.rs sets ESPEAK_DATA_PATH at spawn time.
        run: |
          set -euo pipefail
          SRC=$(ls -d kokoros-src/target/aarch64-apple-darwin/release/build/espeak-rs-sys-*/out/share/espeak-ng-data | head -n1)
          if [ -z "$SRC" ] || [ ! -f "$SRC/phontab" ]; then
            echo "::error::espeak-ng-data not found under espeak-rs-sys build tree"
            exit 1
          fi
          mkdir -p src-tauri/resources
          rm -rf src-tauri/resources/espeak-ng-data
          cp -R "$SRC" src-tauri/resources/espeak-ng-data
          test -f src-tauri/resources/espeak-ng-data/phontab

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.10' --locked

      - name: Build .app (without DMG)
        run: cargo tauri build --target aarch64-apple-darwin --bundles app

      - name: Ad-hoc sign .app (deep)
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/yap-box.app"
          codesign --sign - --force --deep --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create DMG from signed .app
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/yap-box.app"
          DMG_DIR="dist-dmg"
          DMG_PATH="yap-box_${VERSION}_aarch64.dmg"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          cp INSTALL.txt "$DMG_DIR/INSTALL.txt"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "yap-box" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: yap-box ${{ github.ref_name }}
          draft: true
          prerelease: false
          body: |
            Unsigned macOS arm64 build (ad-hoc signed). See `INSTALL.txt` inside the DMG for the full steps.

            **Install:**
            1. Drag `yap-box.app` to `/Applications`.
            2. Clear the quarantine flag so Gatekeeper stops blocking it:
               ```
               xattr -dr com.apple.quarantine /Applications/yap-box.app
               ```
               Or, without a terminal: right-click `yap-box.app` → Open → Open. If blocked on macOS 15+: System Settings → Privacy & Security → Open Anyway.

            On first launch the app will prompt you to download the Kokoro-82M TTS model (~354 MB). No bytes are fetched until you confirm.
          files: |
            ${{ env.DMG_PATH }}
