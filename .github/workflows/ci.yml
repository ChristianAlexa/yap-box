name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - name: Stub Kokoros sidecar for build-script validation
        # Tauri's build script validates externalBin paths exist. CI only
        # type-checks/tests — it never executes the sidecar — so an empty
        # placeholder is enough. The real binary is built in release.yml.
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/koko-aarch64-apple-darwin
          chmod +x src-tauri/binaries/koko-aarch64-apple-darwin
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
